version: '3'

services:

  backend:
    build: ./backend
    container_name: backend

  nginx:
    image: nginx
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

      - ./frontend/index.html:/usr/share/nginx/html/index.html

    depends_on:
      - backend
